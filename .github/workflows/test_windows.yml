# Run tests on Windows.
name: test_windows
on: [push, pull_request]
permissions: read-all
jobs:
  test_windows:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
        - os: windows-2025
          python-version: '3.14'
          toxenv: 'py314'
    steps:
    - name: Configure git
      run: git config --global core.autocrlf false
    - uses: actions/checkout@v6
    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v6
      with:
        python-version: ${{ matrix.python-version }}
        cache: 'pip'
    - name: Install dependencies
      shell: cmd
      run: |
        git clone https://github.com/log2timeline/l2tdevtools.git ..\l2tdevtools
        set PYTHONPATH=..\l2tdevtools
        mkdir downloads
        python ..\l2tdevtools\tools\update.py --download-directory downloads --machine-type amd64 --track dev PyYAML dfdatetime dtfabric libbde libcaes libewf libfcrypto libfsapfs libfsext libfsfat libfshfs libfsntfs libfsxfs libfvde libfwnt libluksde libmodi libphdi libqcow libsigscan libsmdev libsmraw libvhdi libvmdk libvsapm libvsgpt libvshadow libvslvm pytsk3 xattr
    - name: Install tox
      run: |
        python -m pip install --upgrade pip
        python -m pip install tox tox-gh-actions
    - name: Run tests
      run: |
        tox -e ${{ matrix.toxenv }}
